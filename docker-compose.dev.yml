services:
  app:
    build:
      target: dev
    command: ["sh", "-c", "npx prisma migrate deploy && npm run seed && npm run start:dev"]
    environment:
      NODE_ENV: development
    ports:
      - "${HTTP_PORT:-8080}:8080"
    volumes:
      - .:/app
      - backend_node_modules:/app/node_modules

  frontend:
    build:
      context: ../crm-frontend
      dockerfile: Dockerfile
      target: dev
    environment:
      VITE_API_URL: ${VITE_DEV_API_URL:-/api}
      VITE_DEV_API_TARGET: http://app:8080
      VITE_USE_POLLING: ${VITE_USE_POLLING:-true}
      CHOKIDAR_USEPOLLING: ${VITE_USE_POLLING:-true}
    ports:
      - "${FRONTEND_DEV_PORT:-5173}:5173"
    volumes:
      - ../crm-frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  redis:
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"

volumes:
  backend_node_modules:
  frontend_node_modules:
