name: crm

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ACCESS_TTL: ${ACCESS_TTL:-15m}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS must be set}
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER must be set}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB must be set}?schema=public
      DB_HOST: postgres
      DB_NAME: ${POSTGRES_DB:?POSTGRES_DB must be set}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:?POSTGRES_USER must be set}
      HTTP_PORT: 8080
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET must be set}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET must be set}
      REDIS_ADDR: redis:6379
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      REFRESH_TTL: ${REFRESH_TTL:-720h}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:?SEED_ADMIN_EMAIL must be set}
      SEED_ADMIN_OVERWRITE: ${SEED_ADMIN_OVERWRITE:-false}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:?SEED_ADMIN_PASSWORD must be set}
      SEED_ADMIN_ROLE: ${SEED_ADMIN_ROLE:-admin}
    expose:
      - "8080"
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:8080/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ../crm-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    expose:
      - "80"
    networks:
      internal:
      proxy:
        aliases:
          - crm-frontend
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set}
    expose:
      - "5432"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    command:
      [
        "sh",
        "-c",
        'redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}"',
      ]
    expose:
      - "6379"
    networks:
      - internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'REDISCLI_AUTH="$${REDIS_PASSWORD}" redis-cli ping | grep PONG',
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    volumes:
      - redis_data:/data
    restart: unless-stopped

networks:
  internal:
    internal: true
  proxy:
    external: true
    name: ${PROXY_NETWORK:-crm_proxy}

volumes:
  postgres_data:
  redis_data:
